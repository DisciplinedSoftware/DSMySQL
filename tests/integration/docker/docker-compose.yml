services:
  mysql:
    image: mysql:8.0
    container_name: ds_mysql_test
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ${DS_MYSQL_TEST_DATABASE:-ds_mysql_test}
      MYSQL_USER: ${DS_MYSQL_TEST_USER:-ds_mysql_test_user}
      MYSQL_PASSWORD: ${DS_MYSQL_TEST_PASSWORD:-ds_mysql_test_password}
    ports:
      - "${DS_MYSQL_TEST_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 10s
      retries: 10
    networks:
      - ds_mysql_network

volumes:
  mysql_data:

networks:
  ds_mysql_network:
    driver: bridge
